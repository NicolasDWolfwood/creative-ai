name: creative-ai-dev

x-app-environment: &app-environment
  DEPLOYMENT_ENV: "development"
  APP_NAME: "Creative-Ai Dev"
  APP_ENV: "local"
  APP_KEY: "${APP_KEY:?Copy .env.example to .env and set a generated APP_KEY}"
  APP_DEBUG: "true"
  APP_URL: "${APP_URL:-http://localhost:8080}"
  APP_LOCALE: "en"
  ALLOW_INDEXING: "false"
  TRUSTED_HOSTS: "${TRUSTED_HOSTS:-}"
  TRUSTED_PROXIES: "${TRUSTED_PROXIES:-127.0.0.1}"
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "debug"

  DB_CONNECTION: "pgsql"
  DB_URL: "pgsql://creative_ai_dev:local-development-only@postgres:5432/creative_ai_dev"
  DB_SSLMODE: "disable"

  REDIS_CLIENT: "phpredis"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_CACHE_URL: "redis://redis:6379/1"
  REDIS_PREFIX: "creative-ai-dev-database-"
  REDIS_QUEUE_RETRY_AFTER: "240"

  SESSION_DRIVER: "redis"
  SESSION_COOKIE: "creative_ai_dev_session"
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
  CACHE_STORE: "redis"
  CACHE_PREFIX: "creative-ai-dev-cache-"
  QUEUE_CONNECTION: "redis"
  FILESYSTEM_DISK: "public"
  MAIL_MAILER: "log"

x-app-runtime: &app-runtime
  build:
    context: .
    dockerfile: site/Dockerfile
  image: creative-ai-dev:local
  init: true
  environment: *app-environment
  volumes:
    - app-storage:/app/storage
  security_opt:
    - no-new-privileges:true
  pids_limit: 256

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: creative_ai_dev
      POSTGRES_USER: creative_ai_dev
      POSTGRES_PASSWORD: local-development-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=creative_ai_dev --dbname=creative_ai_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  creative-ai-migrate:
    <<: *app-runtime
    restart: "no"
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  creative-ai:
    <<: *app-runtime
    restart: unless-stopped
    ports:
      - "${DEV_HTTP_BIND:-127.0.0.1}:${DEV_HTTP_PORT:-8080}:80"
    depends_on:
      creative-ai-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--header", "Host: localhost", "http://127.0.0.1/ready"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10

  creative-ai-worker:
    <<: *app-runtime
    restart: unless-stopped
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=ai-high,ai,default
      - --sleep=3
      - --tries=2
      - --timeout=180
      - --max-time=3600
      - --memory=384
    depends_on:
      creative-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'for file in /proc/[0-9]*/cmdline; do tr "\000" " " < "$$file" 2>/dev/null | grep -q "^php artisan queue:work " && exit 0; done; exit 1']
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    stop_signal: SIGTERM
    stop_grace_period: 4m

  creative-ai-test:
    <<: *app-runtime
    profiles:
      - tools
    build:
      context: .
      dockerfile: site/Dockerfile
      target: test
    image: creative-ai-dev-test:local
    restart: "no"
    environment:
      <<: *app-environment
      APP_ENV: "testing"
      APP_DEBUG: "false"
      DB_CONNECTION: "sqlite"
      DB_DATABASE: ":memory:"
      DB_URL: ""
      CACHE_STORE: "array"
      QUEUE_CONNECTION: "sync"
      SESSION_DRIVER: "array"
      MAIL_MAILER: "array"
    healthcheck:
      disable: true

volumes:
  postgres-data:
  redis-data:
  app-storage:
