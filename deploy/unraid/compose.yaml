name: "${COMPOSE_PROJECT_NAME:?Set a unique Compose project name}"

x-app-environment: &app-environment
  DEPLOYMENT_ENV: "${DEPLOYMENT_ENV:?Set staging or production}"
  APP_NAME: "Creative-Ai"
  APP_ENV: "production"
  APP_KEY: "${APP_KEY:?Set a persistent Laravel APP_KEY}"
  APP_DEBUG: "false"
  APP_URL: "${APP_URL:?Set the canonical environment URL}"
  APP_LOCALE: "en"
  ALLOW_INDEXING: "${ALLOW_INDEXING:?Explicitly set true or false}"
  TRUSTED_HOSTS: "${TRUSTED_HOSTS:-}"
  TRUSTED_PROXIES: "${TRUSTED_PROXIES:?Set the reverse-proxy IP or smallest CIDR}"
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "${LOG_LEVEL:-warning}"

  DB_CONNECTION: "pgsql"
  DB_URL: "${DB_URL:?Set the isolated PostgreSQL connection URL}"

  REDIS_CLIENT: "phpredis"
  REDIS_URL: "${REDIS_URL:?Set the isolated Redis data URL}"
  REDIS_CACHE_URL: "${REDIS_CACHE_URL:?Set the isolated Redis cache URL}"
  REDIS_PREFIX: "creative-ai-${DEPLOYMENT_ENV}-database-"
  REDIS_QUEUE_RETRY_AFTER: "240"

  SESSION_DRIVER: "redis"
  SESSION_COOKIE: "creative_ai_${DEPLOYMENT_ENV}_session"
  SESSION_SECURE_COOKIE: "true"
  CACHE_STORE: "redis"
  CACHE_PREFIX: "creative-ai-${DEPLOYMENT_ENV}-cache-"
  QUEUE_CONNECTION: "redis"
  FILESYSTEM_DISK: "public"
  MAIL_MAILER: "log"

x-app-runtime: &app-runtime
  image: "${CREATIVE_AI_IMAGE:?Pin the complete GHCR @sha256 reference}"
  init: true
  environment: *app-environment
  volumes:
    - "${CREATIVE_AI_STORAGE:?Set the persistent storage path}:/app/storage"
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  creative-ai-migrate:
    <<: *app-runtime
    restart: "no"
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    healthcheck:
      disable: true
    networks:
      - app-network

  creative-ai:
    <<: *app-runtime
    restart: unless-stopped
    depends_on:
      creative-ai-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--header", "Host: localhost", "http://127.0.0.1/ready"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    networks:
      app-network:
        ipv4_address: "${CREATIVE_AI_IPV4_ADDRESS:?Set the web container address}"
    labels:
      net.unraid.docker.webui: "${APP_URL}"

  creative-ai-worker:
    <<: *app-runtime
    restart: unless-stopped
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=ai-high,ai,default
      - --sleep=3
      - --tries=2
      - --timeout=180
      - --max-time=3600
      - --memory=384
    depends_on:
      creative-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'for file in /proc/[0-9]*/cmdline; do tr "\000" " " < "$$file" 2>/dev/null | grep -q "^php artisan queue:work " && exit 0; done; exit 1']
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    stop_signal: SIGTERM
    stop_grace_period: 4m
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: "${CREATIVE_AI_NETWORK:?Set the existing Docker network name}"
